<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="./">
  <script>
    if (/\/apartments\/admin$/.test(location.pathname)) {
      location.replace(location.pathname.replace(/\/admin$/, '/admin.html') + location.search + location.hash);
    }
  </script>
  <title>Canyon Vista — Unit placement</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: 'Helvetica Neue', Arial, sans-serif; }
    .apartments-admin-panel {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: min(320px, 92vw);
      z-index: 25;
      box-sizing: border-box;
      padding: 14px 12px 16px;
      background: rgba(24, 24, 28, 0.72);
      -webkit-backdrop-filter: blur(28px);
      backdrop-filter: blur(28px);
      border-right: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.95);
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: auto;
    }
    .apartments-admin-header h1 {
      margin: 0 0 6px 0;
      font-size: 1.05rem;
      font-weight: 600;
    }
    .admin-link-btn {
      display: inline-block;
      margin-bottom: 4px;
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-family: inherit;
    }
    .admin-link-btn:hover { background: rgba(255,255,255,0.06); }
    .admin-status { margin: 0; font-size: 12px; color: rgba(255,255,255,0.65); line-height: 1.4; }
    .admin-unit-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: min(40vh, 320px);
      overflow-y: auto;
    }
    .admin-unit-row {
      text-align: left;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.25);
      color: inherit;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .admin-unit-row:hover { background: rgba(255,255,255,0.06); }
    .admin-unit-row.active {
      border-color: rgba(34, 197, 94, 0.45);
      background: rgba(34, 197, 94, 0.12);
    }
    .admin-unit-num { font-weight: 600; font-size: 14px; }
    .admin-unit-meta { font-size: 11px; color: rgba(255,255,255,0.55); }
    .admin-pos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      font-size: 11px;
    }
    .admin-pos-grid label { display: flex; flex-direction: column; gap: 4px; color: rgba(255,255,255,0.65); }
    .admin-pos-grid input {
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.35);
      color: #fff;
      font-family: inherit;
      font-size: 13px;
    }
    .admin-primary, .admin-secondary {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      font-family: inherit;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
    }
    .admin-primary { background: #22c55e; color: #052e16; }
    .admin-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.15); }
    .admin-actions { display: flex; flex-direction: column; gap: 8px; margin-top: auto; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/",
      "@lumaai/luma-web": "https://unpkg.com/@lumaai/luma-web@0.2.0/dist/library/luma-web.module.js"
    }
  }
  </script>
</head>
<body>
  <script type="module">
    import { createSceneBoot } from './scene-boot.mjs';
    import { fetchUnitsData } from './units-data.mjs';
    import { initAdminDashboard } from './admin-dashboard.mjs';

    const boot = createSceneBoot();
    const units = await fetchUnitsData();
    const admin = initAdminDashboard({
      scene: boot.scene,
      camera: boot.camera,
      controls: boot.controls,
      renderer: boot.renderer,
      units,
    });
    boot.animate(() => admin.frame());
  </script>
</body>
</html>

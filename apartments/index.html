<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="./">
  <script>
    if (/\/apartments$/.test(location.pathname)) {
      location.replace(location.pathname + '/' + location.search + location.hash);
    }
  </script>
  <title>Canyon Vista — Apartments</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: 'Helvetica Neue', Arial, sans-serif; }
    .apartments-topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      pointer-events: none;
    }
    .apartments-topbar a, .apartments-topbar label, .apartments-topbar button {
      pointer-events: auto;
    }
    .apartments-brand {
      color: rgba(255,255,255,0.92);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .apartments-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .apartments-filter {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      user-select: none;
      background: rgba(32,32,32,0.45);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 6px 12px;
    }
    .apartments-filter input { accent-color: #22c55e; }
    .apartments-link {
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      background: rgba(32,32,32,0.45);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      padding: 8px 14px;
    }
    .apartments-link:hover { background: rgba(255,255,255,0.08); }
    #apartments-unit-card {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: min(380px, 100vw);
      z-index: 15;
      display: flex;
      align-items: stretch;
      justify-content: flex-end;
      pointer-events: none;
      opacity: 0;
      transform: translateX(12px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    #apartments-unit-card.visible {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }
    .apartments-unit-card-inner {
      margin: 56px 14px 14px 14px;
      width: 100%;
      align-self: flex-start;
      box-sizing: border-box;
      padding: 18px 18px 16px;
      border-radius: 18px;
      background: rgba(32, 32, 32, 0.55);
      -webkit-backdrop-filter: blur(40px);
      backdrop-filter: blur(40px);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.95);
      position: relative;
      max-height: calc(100vh - 80px);
      overflow: auto;
    }
    .apartments-unit-card-close {
      position: absolute;
      top: 10px; right: 10px;
      width: 32px; height: 32px;
      border: none;
      border-radius: 50%;
      background: rgba(0,0,0,0.25);
      color: #fff;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
    }
    .apartments-unit-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #14532d;
      background: #86efac;
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
    }
    .apartments-unit-number { margin: 0 0 4px 0; font-size: 1.35rem; font-weight: 600; }
    .apartments-unit-price { margin: 0 0 16px 0; font-size: 1.1rem; color: rgba(255,255,255,0.88); }
    .apartments-unit-dl { margin: 0 0 18px 0; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .apartments-unit-dl div { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; }
    .apartments-unit-dl dt { margin: 0; font-size: 11px; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 0.04em; }
    .apartments-unit-dl dd { margin: 4px 0 0 0; font-size: 15px; font-weight: 600; }
    .apartments-unit-apply {
      display: block;
      text-align: center;
      padding: 12px 16px;
      border-radius: 12px;
      background: #22c55e;
      color: #052e16;
      font-weight: 700;
      text-decoration: none;
      font-size: 15px;
    }
    .apartments-unit-apply:hover { filter: brightness(1.05); }
    .apartments-unit-apply[aria-disabled="true"] { opacity: 0.45; pointer-events: none; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/",
      "@lumaai/luma-web": "https://unpkg.com/@lumaai/luma-web@0.2.0/dist/library/luma-web.module.js"
    }
  }
  </script>
</head>
<body>
  <div class="apartments-topbar">
    <span class="apartments-brand">Canyon Vista — Apartments</span>
    <div class="apartments-actions">
      <label class="apartments-filter">
        <input type="checkbox" id="filterAvail" checked />
        Show only available
      </label>
      <a class="apartments-link" href="admin.html">Manager dashboard</a>
      <a class="apartments-link" href="../index.html">All properties</a>
    </div>
  </div>
  <script type="module">
    import { createSceneBoot } from './scene-boot.mjs';
    import { fetchUnitsData } from './units-data.mjs';
    import { getPositions } from './unit-positions.mjs';
    import { mountUnitMarkers } from './unit-markers.mjs';
    import { showUnitCard, hideUnitCard } from './unit-info-card.mjs';

    let onlyAvailable = true;
    const boot = createSceneBoot();
    const units = await fetchUnitsData();
    let positions = getPositions();
    const markers = mountUnitMarkers({
      scene: boot.scene,
      camera: boot.camera,
      renderer: boot.renderer,
      mode: 'viewer',
      units,
      getPositionsMap: () => positions,
      getOnlyAvailable: () => onlyAvailable,
      onUnitClick: (unit) => showUnitCard(unit),
    });

    boot.animate(() => {
      markers.update();
    });

    document.getElementById('filterAvail').addEventListener('change', (e) => {
      onlyAvailable = e.target.checked;
      markers.rebuild();
    });

    window.addEventListener('pageshow', () => {
      positions = getPositions();
      markers.rebuild();
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') hideUnitCard();
    });
  </script>
</body>
</html>
